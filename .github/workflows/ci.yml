name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Cache Bazel repositories and outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelrc', '**/BUILD.bazel', '**/*.bzl') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Show Bazel version
        run: bazel version

      - name: Build application
        run: bazel build //apps:application --platforms=//targets/stm32l4xx:application_platform

      - name: Build bootloader
        run: bazel build //apps:bootloader --platforms=//targets/stm32l4xx:bootloader_platform

      - name: Run unit tests
        run: |
          bazel test \
            //apps:active_object_test \
            //apps:bld_crc32_test \
            //apps:bld_engine_test \
            //apps:bld_meta_test \
            //apps:bld_storage_flash_test \
            //apps:bld_transport_uart_dma_test \
            --test_output=errors